services:
  postgres:
    image: postgres:15
    container_name: wotn-postgres
    environment:
      POSTGRES_USER: wotn_user
      POSTGRES_PASSWORD: wotn_password
      POSTGRES_DB: wotn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres-data:
